services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: todo_db
    ports:
      - "5433:5432"

  backend:
    build: ./server
    ports:
      - "5001:5000"
    depends_on:
      - postgres

  frontend:
    build: ./client
    ports:
      - "3000:3000"
    depends_on:
      - backend
